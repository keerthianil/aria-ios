name: ARIA
options:
  bundleIdPrefix: com.keerthia
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

targets:
  ARIA:
    type: application
    platform: iOS
    sources:
      - path: ARIA
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        INFOPLIST_GENERATION_MODE: GeneratedFile
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_EMIT_LOC_STRINGS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        DEVELOPMENT_TEAM: ""
        PRODUCT_BUNDLE_IDENTIFIER: com.keerthia.ARIA
        SUPPORTED_DESTINATIONS: "iphone"
        SWIFT_VERSION: "5.9"
        INFOPLIST_KEY_NSCameraUsageDescription: "ARIA uses the camera to capture screens you want to audit for accessibility."
